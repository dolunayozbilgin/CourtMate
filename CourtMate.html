<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CourtMate — Tenis Eşleşme</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Spectral:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #07080b;
    background-image: radial-gradient(120% 90% at 50% -10%, #11141c 0%, #07080b 60%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Archivo', system-ui, sans-serif;
  }
  /* ── Desktop: telefon çerçevesi ── */
  #stage { transform-origin: center center; }
  #device {
    width: 402px; height: 874px; border-radius: 52px; overflow: hidden; position: relative;
    background: #000; box-shadow: 0 50px 100px rgba(0,0,0,.55), 0 0 0 11px #0a0a0c, 0 0 0 12px #26262b;
  }
  .dev-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 36px; border-radius: 24px; background: #000; z-index: 60; }
  .dev-status { position: absolute; top: 0; left: 0; right: 0; height: 54px; z-index: 55; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; pointer-events: none; }
  .dev-time { font-family: -apple-system, system-ui; font-weight: 600; font-size: 16px; color: #fff; padding-top: 4px; }
  .dev-icons { display: flex; align-items: center; gap: 7px; padding-top: 4px; }
  #root { position: absolute; inset: 0; }
  .dev-home { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: rgba(255,255,255,.5); z-index: 70; pointer-events: none; }

  /* ── Mobil: çerçeve yok, direkt full-screen ── */
  @media (max-width: 500px) {
    html, body { height: 100%; overflow: hidden; background: #0d1117; }
    body { display: block; align-items: unset; justify-content: unset; }
    #stage { position: fixed; inset: 0; transform: none !important; }
    #device {
      width: 100%; height: 100%;
      border-radius: 0; overflow: hidden;
      box-shadow: none;
      background: #0d1117;
    }
    .dev-island, .dev-status, .dev-home { display: none; }
    #root { position: fixed; inset: 0; overflow: hidden; }
  }

  /* ════════════════ THEME TOKENS ════════════════ */
  .cm-root {
    --accent: #dcfc32;
    --accent-ink: #0d1117;
    --bg: #0d1117;
    --bg2: #11161f;
    --card: #161c28;
    --card2: #1c2433;
    --text: #f4f7ef;
    --muted: rgba(244,247,239,.56);
    --faint: rgba(244,247,239,.34);
    --line: rgba(255,255,255,.09);
    --nope: #ff5050;
    --radius: 26px;
    --display: 'Archivo Black', sans-serif;
    --display-tr: -0.01em;
    --display-case: uppercase;
    --mono: 'JetBrains Mono', monospace;
    height: 100%; width: 100%;
    /* Mobilde safe-area (notch/home bar) için */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    background: var(--bg);
    color: var(--text);
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  /* subtle court-grid backdrop */
  .cm-root::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask-image: radial-gradient(120% 80% at 50% 0%, #000 30%, transparent 75%);
            mask-image: radial-gradient(120% 80% at 50% 0%, #000 30%, transparent 75%);
    opacity: .5;
  }

  .cm-root[data-theme="premium"] {
    --accent: #c9b26b;
    --accent-ink: #14160f;
    --bg: #14160f;
    --bg2: #181b12;
    --card: #1d2016;
    --card2: #24281b;
    --text: #ece9dc;
    --muted: rgba(236,233,220,.55);
    --faint: rgba(236,233,220,.32);
    --line: rgba(236,233,220,.08);
    --nope: #d98873;
    --radius: 18px;
    --display: 'Spectral', serif;
    --display-tr: 0;
    --display-case: none;
  }
  .cm-root[data-theme="premium"]::before { opacity: .28; }
  .cm-root[data-mate="off"] .cm-mate { display: none; }

  /* ════════════════ TOP BAR ════════════════ */
  .cm-app, .cm-gate { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }
  .cm-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 56px 20px 12px; flex-shrink: 0;
  }
  .cm-brand { display: flex; align-items: center; gap: 8px; }
  .cm-brand-mark { color: var(--accent); font-size: 18px; transform: translateY(-1px); }
  .cm-brand-name { font-family: var(--mono); font-weight: 500; font-size: 15px; letter-spacing: .14em; color: var(--text); }
  .cm-brand-name b { color: var(--accent); font-weight: 700; }
  .cm-live { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .cm-live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--nope); box-shadow: 0 0 0 3px color-mix(in srgb, var(--nope) 22%, transparent); animation: cm-pulse 1.8s infinite; }
  @keyframes cm-pulse { 50% { opacity: .35; } }

  /* ════════════════ LEVEL FILTER ════════════════ */
  .cm-discover { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .cm-filter { display: flex; gap: 7px; padding: 4px 20px 8px; flex-shrink: 0; }
  .cm-filter-btn {
    flex: 1; padding: 9px 4px; border: 1px solid var(--line); background: transparent;
    color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: .03em; border-radius: 11px; cursor: pointer; transition: .18s;
  }
  .cm-filter-btn.is-active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }

  /* ════════════════ DECK + CARD ════════════════ */
  .cm-deck-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 4px 18px 0; }
  .cm-deck { position: relative; flex: 1; min-height: 0; }
  .cm-card-slot { position: absolute; inset: 0; }
  .cm-card-slot.is-behind { transform: scale(.94) translateY(14px); opacity: .6; filter: saturate(.7); }
  .cm-card-slot.is-front { will-change: transform; touch-action: none; user-select: none; }

  .cm-card {
    position: relative; height: 100%; display: flex; flex-direction: column;
    background:
      radial-gradient(130% 80% at 80% 0%, var(--card2), var(--card) 60%);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px 20px 18px; overflow: hidden;
    box-shadow: 0 24px 50px rgba(0,0,0,.45);
  }
  .cm-card.is-expanded { overflow-y: auto; }
  .cm-card::after { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    box-shadow: inset 0 1px 0 color-mix(in srgb, var(--text) 8%, transparent); }

  .cm-avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent), 0 8px 22px color-mix(in srgb, var(--accent) 18%, transparent); }

  .cm-card-top { display: flex; gap: 16px; align-items: center; }
  .cm-card-id { min-width: 0; }
  .cm-name-row { display: flex; align-items: center; gap: 8px; }
  .cm-name { font-family: var(--display); text-transform: var(--display-case); letter-spacing: var(--display-tr);
    font-size: 30px; line-height: 1; margin: 0; color: var(--text); font-weight: 800; }
  .cm-verified { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cm-meta { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 7px; letter-spacing: .01em; white-space: nowrap; }
  .cm-avail { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; color: var(--text); margin-top: 6px; }
  .cm-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .cm-dot.is-hot { background: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent); }

  .cm-style-row { display: flex; gap: 8px; margin-top: 16px; }
  .cm-style-tag, .cm-level-tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: .04em; padding: 6px 11px; border-radius: 8px; white-space: nowrap; }
  .cm-style-tag { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
  .cm-level-tag { background: var(--card2); color: var(--muted); border: 1px solid var(--line); }

  .cm-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .cm-stat { background: color-mix(in srgb, var(--bg) 55%, var(--card2)); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; }
  .cm-stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--faint); }
  .cm-stat-value { font-family: var(--display); text-transform: var(--display-case); font-size: 23px; margin-top: 6px; color: var(--text); letter-spacing: var(--display-tr); }
  .cm-stat-value.is-accent { color: var(--accent); }
  .cm-stars { display: flex; gap: 3px; margin-top: 9px; }

  .cm-bio { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .cm-bio-label { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--faint); }
  .cm-bio p { margin: 8px 0 0; font-size: 14px; line-height: 1.5; color: var(--text); }
  .cm-bio-court { display: flex; align-items: center; gap: 7px; margin-top: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .cm-card-foot { margin-top: auto; padding-top: 16px; display: flex; align-items: center; justify-content: space-between; }
  .cm-mate { display: flex; flex-direction: column; gap: 3px; }
  .cm-mate-label { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--faint); white-space: nowrap; }
  .cm-mate-val { font-family: var(--display); text-transform: var(--display-case); font-size: 22px; color: var(--accent); letter-spacing: var(--display-tr); }
  .cm-mate-val i { font-size: 12px; color: var(--faint); font-style: normal; }
  .cm-expand { display: flex; align-items: center; gap: 5px; background: var(--card2); border: 1px solid var(--line); color: var(--muted);
    font-family: var(--mono); font-size: 11px; padding: 9px 13px; border-radius: 10px; cursor: pointer; }
  .cm-expand:hover { color: var(--text); }

  /* stamps */
  .cm-stamp { position: absolute; top: 26px; font-family: var(--display); text-transform: uppercase; font-size: 34px;
    padding: 6px 16px; border-radius: 12px; letter-spacing: .02em; z-index: 4; pointer-events: none; }
  .cm-stamp.is-like { left: 22px; color: var(--accent); border: 4px solid var(--accent); transform: rotate(-14deg); }
  .cm-stamp.is-nope { right: 22px; color: var(--nope); border: 4px solid var(--nope); transform: rotate(14deg); }

  /* ════════════════ ACTION BUTTONS ════════════════ */
  .cm-actions { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 18px 0 14px; flex-shrink: 0; }
  .cm-act { border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .15s, opacity .15s; }
  .cm-act:active { transform: scale(.9); }
  .cm-act:disabled { opacity: .3; cursor: default; }
  .cm-act.is-rewind { width: 50px; height: 50px; background: var(--card2); border: 1px solid var(--line); color: var(--muted); }
  .cm-act.is-nope { width: 64px; height: 64px; background: var(--card); border: 1.5px solid var(--nope); color: var(--nope); box-shadow: 0 8px 22px color-mix(in srgb, var(--nope) 20%, transparent); }
  .cm-act.is-like { width: 64px; height: 64px; background: var(--accent); border: none; color: var(--accent-ink); box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 35%, transparent); }

  /* ════════════════ EMPTY / STUB ════════════════ */
  .cm-empty, .cm-stub { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
  .cm-empty-mark, .cm-stub-mark { font-family: var(--display); color: var(--accent); font-size: 24px; letter-spacing: .1em; opacity: .7; }
  .cm-stub-mark { font-size: 40px; }
  .cm-empty h3, .cm-stub h3 { font-family: var(--display); text-transform: var(--display-case); font-size: 26px; margin: 18px 0 8px; letter-spacing: var(--display-tr); }
  .cm-empty p, .cm-stub p { color: var(--muted); font-size: 14px; line-height: 1.5; max-width: 260px; margin: 0 0 20px; }
  .cm-reset { background: var(--accent); color: var(--accent-ink); border: none; font-family: var(--mono); font-weight: 700; font-size: 13px; padding: 12px 22px; border-radius: 12px; cursor: pointer; }

  /* ════════════════ TAB BAR ════════════════ */
  .cm-tabbar { display: flex; flex-shrink: 0; padding: 8px 10px 26px; border-top: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(10px); }
  .cm-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 4px 0; }
  .cm-tab-ico { position: relative; }
  .cm-tab-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .03em; color: var(--muted); }
  .cm-tab.is-on .cm-tab-label { color: var(--accent); }
  .cm-badge { position: absolute; top: -4px; right: -8px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--nope); color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  /* ════════════════ LEVEL GATE ════════════════ */
  .cm-gate { padding: 76px 26px 30px; gap: 0; justify-content: flex-start; }
  .cm-gate-kicker { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; color: var(--accent); }
  .cm-gate-title { font-family: var(--display); text-transform: var(--display-case); font-size: 54px; line-height: .92; margin: 16px 0 0; letter-spacing: var(--display-tr); }
  .cm-gate-title em { color: var(--accent); font-style: normal; }
  .cm-gate-sub { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 16px 0 0; max-width: 300px; }
  .cm-gate-list { display: flex; flex-direction: column; gap: 11px; margin: 28px 0; }
  .cm-gate-opt { position: relative; overflow: hidden; display: flex; align-items: center; gap: 12px; text-align: left;
    background: color-mix(in srgb, var(--lv) 9%, var(--card)); border: 1px solid color-mix(in srgb, var(--lv) 26%, var(--line));
    border-radius: 18px; padding: 16px 16px 16px 22px; cursor: pointer; transition: .18s; }
  .cm-gate-opt::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--lv); }
  /* per-level tone: cool→warm with difficulty */
  .cm-gate-list .cm-gate-opt:nth-child(1) { --lv: #34d399; }
  .cm-gate-list .cm-gate-opt:nth-child(2) { --lv: #f5c044; }
  .cm-gate-list .cm-gate-opt:nth-child(3) { --lv: #ff7058; }
  .cm-gate-opt.is-sel { border-color: var(--lv); background: color-mix(in srgb, var(--lv) 17%, var(--card));
    box-shadow: 0 0 0 1px var(--lv), 0 10px 26px color-mix(in srgb, var(--lv) 22%, transparent); }
  .cm-gate-opt-main { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .cm-gate-opt-label { font-family: var(--display); text-transform: var(--display-case); font-size: 20px; letter-spacing: var(--display-tr); color: var(--lv); }
  .cm-gate-opt-desc { font-size: 12px; color: var(--muted); line-height: 1.35; }
  .cm-gate-utr { font-family: var(--mono); font-size: 10px; color: color-mix(in srgb, var(--lv) 75%, var(--muted)); white-space: nowrap; }
  .cm-gate-check { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid color-mix(in srgb, var(--lv) 40%, var(--line)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cm-gate-check svg { opacity: 0; }
  .cm-gate-check.is-sel { background: var(--lv); border-color: var(--lv); }
  .cm-gate-check.is-sel svg { opacity: 1; }

  /* shared CTA */
  .cm-cta { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 16px; padding: 17px; font-family: var(--mono); font-weight: 700; font-size: 14px; letter-spacing: .06em; cursor: pointer; transition: .15s; white-space: nowrap; }
  .cm-cta:active { transform: scale(.98); }
  .cm-cta:disabled { opacity: .35; cursor: default; }
  .cm-ghost { width: 100%; background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 14px; cursor: pointer; }
  .cm-ghost:hover { color: var(--text); }

  /* ════════════════ MATCH OVERLAY ════════════════ */
  .cm-match { position: absolute; inset: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 92%, #000);
    display: flex; align-items: center; justify-content: center; padding: 30px; overflow: hidden; opacity: 1; }
  .cm-match-glow { position: absolute; top: 20%; left: 50%; width: 320px; height: 320px; transform: translateX(-50%);
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 40%, transparent), transparent 70%); filter: blur(20px); }
  .cm-match-inner { position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .cm-match-kicker { font-family: var(--mono); font-size: 11px; letter-spacing: .2em; color: var(--accent); }
  .cm-match-title { font-family: var(--display); text-transform: var(--display-case); font-size: 52px; line-height: .9; margin: 12px 0 0; letter-spacing: var(--display-tr); }
  .cm-match-title em { color: var(--accent); font-style: normal; }
  .cm-match-avatars { display: flex; align-items: center; gap: 16px; margin: 28px 0 20px; }
  .cm-match-av { animation: cm-pop .5s cubic-bezier(.3,1.5,.5,1) both; }
  .cm-match-av:nth-child(3) { animation-delay: .12s; }
  @keyframes cm-pop { from { transform: scale(.4); } to { transform: scale(1); } }
  .cm-match-you { width: 96px; height: 96px; border-radius: 50%; background: var(--card2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
  .cm-match-you span { font-family: var(--display); text-transform: var(--display-case); font-size: 22px; color: var(--muted); }
  .cm-match-vs { font-family: var(--display); font-size: 26px; color: var(--accent); }
  .cm-match-line { color: var(--muted); font-size: 14px; line-height: 1.5; max-width: 280px; margin: 0 0 26px; }
  .cm-match-line b { color: var(--text); }
  .cm-match-actions { width: 100%; display: flex; flex-direction: column; gap: 4px; }

  .cm-sent-check { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; animation: cm-pop .5s cubic-bezier(.3,1.5,.5,1) both; }
  .cm-sent-recap { width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 6px 16px; margin: 22px 0; }
  .cm-sent-recap > div { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .cm-sent-recap > div:last-child { border-bottom: none; }
  .cm-sent-recap span { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--faint); white-space: nowrap; }
  .cm-sent-recap b { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; }

  /* ════════════════ MATCHES LIST ════════════════ */
  .cm-mlist { flex: 1; overflow-y: auto; padding: 8px 18px; }
  .cm-mlist-head { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--faint); padding: 10px 4px; }
  .cm-mrow { width: 100%; display: flex; align-items: center; gap: 13px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; margin-bottom: 10px; cursor: pointer; text-align: left; }
  .cm-mrow-main { flex: 1; min-width: 0; }
  .cm-mrow-name { font-family: var(--display); text-transform: var(--display-case); font-size: 17px; letter-spacing: var(--display-tr); }
  .cm-mrow-sub { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 3px; }
  .cm-mrow-cta { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent-ink); background: var(--accent); padding: 8px 12px; border-radius: 9px; white-space: nowrap; }

  /* ════════════════ SCHEDULE SHEET ════════════════ */
  .cm-sheet-scrim { position: absolute; inset: 0; z-index: 45; background: rgba(0,0,0,.5); display: flex; align-items: flex-end; opacity: 1; }

// ── Yardımcı ──────────────────────────────────────────────
function _initials(name) {
  const p = String(name || '').trim().split(/\s+/).filter(Boolean);
  return ((p[0]?.[0] || '') + (p.length > 1 ? p[p.length - 1][0] : '')).toLocaleUpperCase('tr');
}
function _hue(s) {
  let h = 7;
  for (const c of String(s || '')) h = (h * 31 + c.charCodeAt(0)) % 360;
  return h;
}
function _haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// DB profile satırını uygulama içi `me` nesnesine dönüştür
function profileToMe(profile, email) {
  const levels = window.CM_LEVELS || [];
  const lvl = levels.find(l => l.id === profile.level);
  return {
    id:         profile.id,
    isMe:       true,
    email:      email || '',
    name:       profile.name,
    initials:   _initials(profile.name),
    age:        profile.age,
    level:      profile.level,
    levelLabel: lvl ? lvl.label : profile.level,
    utrRange:   lvl ? lvl.utr : '—',
    style:      profile.style  || '',
    hand:       profile.hand   || 'Sağ el',
    court:      profile.court  || '—',
    avail:      profile.avail  || '',
    bio:        profile.bio    || '',
    hue:        _hue((profile.name || '') + (profile.style || '')),
    avatar_url: profile.avatar_url || null,
    lat:        profile.lat  || null,
    lng:        profile.lng  || null,
  };
}

// ── Auth ──────────────────────────────────────────────────

async function cmSignUp(email, password, profile) {
  const { data, error } = await cm_db.auth.signUp({
    email: email.trim(),
    password,
    options: {
      data: {
        name:  profile.name,
        age:   String(profile.age),
        level: profile.level,
        style: profile.style  || '',
        hand:  profile.hand   || 'Sağ el',
        court: profile.court  || '',
        avail: profile.avail  || '',
        bio:   profile.bio    || '',
      }
    }
  });
  if (error) throw error;

  const needsConfirmation = !data.session;

  // E-posta onayı gerekmiyorsa profili hemen yaz
  if (data.session && data.user) {
    await cmSyncProfile(data.user.id, profile);
  }

  return { needsConfirmation, user: data.user, session: data.session };
}

async function cmSignIn(email, password) {
  const { data, error } = await cm_db.auth.signInWithPassword({ email: email.trim(), password });
  if (error) throw error;
  return data; // { user, session }
}

async function cmSignOut() {
  const { error } = await cm_db.auth.signOut();
  if (error) console.warn('cmSignOut:', error.message);
}

async function cmGetSession() {
  const { data, error } = await cm_db.auth.getSession();
  if (error) throw error;
  return data; // { session }
}

function cmOnAuthStateChange(callback) {
  return cm_db.auth.onAuthStateChange(callback);
}

// ── Profil ────────────────────────────────────────────────

async function cmSyncProfile(userId, profile) {
  const { error } = await cm_db.from('profiles').upsert({
    id:    userId,
    name:  profile.name,
    age:   Number(profile.age),
    level: profile.level,
    style: profile.style  || null,
    hand:  profile.hand   || 'Sağ el',
    court: profile.court && profile.court !== '—' ? profile.court : null,
    avail: profile.avail  || null,
    bio:   profile.bio    || null,
  });
  if (error) throw error;
}

async function cmGetProfile(userId) {
  const { data, error } = await cm_db
    .from('profiles')
    .select('*')
    .eq('id', userId)
    .maybeSingle();
  if (error) throw error;
  return data;
}

async function cmUpdateProfile(userId, updates) {
  const { data, error } = await cm_db
    .from('profiles')
    .update(updates)
    .eq('id', userId)
    .select()
    .single();
  if (error) throw error;
  return data;
}

// ── Eşleşmeler ────────────────────────────────────────────

async function cmSendMatchRequest(senderId, receiverId) {
  const { data, error } = await cm_db
    .from('matches')
    .insert({ sender_id: senderId, receiver_id: receiverId })
    .select()
    .single();
  if (error) throw error;
  return data;
}

async function cmGetMatches(userId) {
  const { data, error } = await cm_db
    .from('matches')
    .select('*, sender:sender_id(id,name,age,level,court,avail,style,hand), receiver:receiver_id(id,name,age,level,court,avail,style,hand)')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`);
  if (error) throw error;
  return data || [];
}

async function cmAcceptMatch(matchId) {
  const { data, error } = await cm_db
    .from('matches')
    .update({ status: 'accepted' })
    .eq('id', matchId)
    .select()
    .single();
  if (error) throw error;
  return data;
}

// ── Mesajlar ──────────────────────────────────────────────

async function cmGetMessages(matchId) {
  const { data, error } = await cm_db
    .from('messages')
    .select('*')
    .eq('match_id', matchId)
    .order('created_at', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function cmSendMsg(matchId, senderId, text) {
  const { data, error } = await cm_db
    .from('messages')
    .insert({ match_id: matchId, sender_id: senderId, text })
    .select()
    .single();
  if (error) throw error;
  return data;
}

async function cmMarkRead(matchId, userId) {
  await cm_db
    .from('messages')
    .update({ read_at: new Date().toISOString() })
    .eq('match_id', matchId)
    .neq('sender_id', userId)
    .is('read_at', null);
}

function cmSubscribeMessages(matchId, callback) {
  return cm_db
    .channel(`messages-${matchId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `match_id=eq.${matchId}` }, callback)
    .subscribe();
}

function cmSubscribeMatches(userId, callback) {
  return cm_db
    .channel(`matches-user-${userId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches', filter: `receiver_id=eq.${userId}` }, callback)
    .subscribe();
}

// Tüm mesajları dinle (RLS sadece bizim görebildiğimiz satırları gönderir)
function cmSubscribeAllMessages(callback) {
  return cm_db
    .channel('messages-all-' + Math.random().toString(36).slice(2))
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, callback)
    .subscribe();
}

// Tüm eşleşme değişikliklerini dinle (RLS: sadece kendi eşleşmelerimiz)
function cmSubscribeAllMatches(callback) {
  return cm_db
    .channel('matches-all-' + Math.random().toString(36).slice(2))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, callback)
    .subscribe();
}

// ── Keşfet: Gerçek oyuncuları getir ───────────────────────
function _utrFromProfile(p) {
  const ranges = { baslangic: [2.0, 3.9], orta: [4.0, 6.9], ileri: [7.0, 10.0] };
  const [min, max] = ranges[p.level] || [3.0, 6.0];
  let h = 0; for (const c of String(p.id || '')) h = (h * 31 + c.charCodeAt(0)) % 1000;
  return +(min + (h / 1000) * (max - min)).toFixed(1);
}

function profileToPlayer(p, sentToIds, receivedFromIds) {
  return {
    id:       p.id,
    name:     p.name,
    initials: _initials(p.name),
    age:      p.age,
    level:    p.level,
    utr:      _utrFromProfile(p),
    lat:      p.lat  || null,
    lng:      p.lng  || null,
    dist:     null,
    avail:    p.avail   || 'Esnek',
    court:    p.court   || 'Belirtilmemiş',
    mutual:   (receivedFromIds || new Set()).has(p.id) && !(sentToIds || new Set()).has(p.id),
    style:    p.style   || '',
    hand:     p.hand    || 'Sağ el',
    bio:      p.bio     || '',
    hue:      _hue((p.name || '') + (p.style || '')),
    verified: false,
    isReal:   true,
  };
}

// ── Push bildirimleri ──────────────────────────────────────
// VAPID public key — npx web-push generate-vapid-keys ile üret, buraya yapıştır
const CM_VAPID_PUBLIC_KEY = 'BClCuN7XFyVwFI0h3VBsZvcev_fSylZ8tc8UIQ9WEAg5qKPUfH-2dDJT89ed9o3Sx0EZoNCgsj_YOfcpFc5LLkM';

function _urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const b64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function cmRegisterPush(userId) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (CM_VAPID_PUBLIC_KEY === 'BURAYA_VAPID_PUBLIC_KEY_YAZIN') return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;
    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: _urlBase64ToUint8Array(CM_VAPID_PUBLIC_KEY),
    });
    const j = sub.toJSON();
    await cm_db.from('push_subscriptions').upsert({
      user_id: userId, endpoint: j.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth,
    });
  } catch(e) { console.warn('Push kaydı başarısız:', e.message); }
}

// ── Engelle / Şikayet ──────────────────────────────────────

async function cmBlockUser(blockerId, blockedId) {
  const { error } = await cm_db.from('blocks').insert({ blocker_id: blockerId, blocked_id: blockedId });
  if (error && !error.message.includes('duplicate')) throw error;
}

async function cmReportUser(reporterId, reportedId, reason) {
  const { error } = await cm_db.from('reports').insert({ reporter_id: reporterId, reported_id: reportedId, reason });
  if (error) throw error;
}

async function cmGetBlockedIds(userId) {
  const { data, error } = await cm_db.from('blocks').select('blocked_id').eq('blocker_id', userId);
  if (error) throw error;
  return (data || []).map(r => r.blocked_id);
}

// ── Konum kaydet ───────────────────────────────────────────

async function cmSaveLocation(userId, lat, lng) {
  await cmUpdateProfile(userId, { lat, lng });
}

// ── Avatar yükleme ─────────────────────────────────────────

async function cmUploadAvatar(userId, file) {
  if (file.size > 5 * 1024 * 1024) throw new Error('Fotoğraf en fazla 5 MB olabilir');
  if (!file.type.startsWith('image/')) throw new Error('Sadece resim dosyası yükleyebilirsin');
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = `${userId}/avatar.${ext}`;
  const { error: upErr } = await cm_db.storage.from('avatars').upload(path, file, {
    upsert: true, contentType: file.type,
  });
  if (upErr) throw upErr;
  const { data } = cm_db.storage.from('avatars').getPublicUrl(path);
  const publicUrl = data.publicUrl + '?t=' + Date.now();
  await cmUpdateProfile(userId, { avatar_url: publicUrl });
  return publicUrl;
}

// ── Hesap silme (App Store gereksinimi) ───────────────────

async function cmDeleteAccount(userId) {
  await cm_db.storage.from('avatars').remove([`${userId}/avatar.jpg`, `${userId}/avatar.png`, `${userId}/avatar.jpeg`, `${userId}/avatar.webp`]);
  const { error } = await cm_db.rpc('delete_own_account');
  if (error) {
    // RPC yoksa profili sil (auth.users cascade ile temizler)
    await cm_db.from('profiles').delete().eq('id', userId);
    await cm_db.auth.signOut();
  }
}

// ── Maç Planlaması ───────────────────────────────────────

async function cmSendSchedule(matchId, senderId, receiverId, { courtName, courtSurf, day, time }) {
  const { data, error } = await cm_db
    .from('scheduled_matches')
    .insert({ match_id: matchId, sender_id: senderId, receiver_id: receiverId,
              court_name: courtName, court_surf: courtSurf, day, scheduled_time: time })
    .select().single();
  if (error) throw error;
  return data;
}

async function cmRespondSchedule(scheduleId, status) {
  const { error } = await cm_db
    .from('scheduled_matches')
    .update({ status })
    .eq('id', scheduleId);
  if (error) throw error;
}

async function cmGetMySchedules(userId) {
  const { data, error } = await cm_db
    .from('scheduled_matches')
    .select('*')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}

async function cmGetDiscoverPlayers(userId) {
  const [{ data: profiles, error: pe }, { data: myMatches }] = await Promise.all([
    cm_db.from('profiles').select('*').neq('id', userId),
    cm_db.from('matches').select('sender_id,receiver_id,status')
      .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`),
  ]);
  if (pe) throw pe;
  const sentTo       = new Set((myMatches || []).filter(m => m.sender_id   === userId).map(m => m.receiver_id));
  const receivedFrom = new Set((myMatches || []).filter(m => m.receiver_id === userId).map(m => m.sender_id));
  return (profiles || []).map(p => profileToPlayer(p, sentTo, receivedFrom));
}

Object.assign(window, {
  cm_db, profileToMe, profileToPlayer,
  cmSignUp, cmSignIn, cmSignOut, cmGetSession, cmOnAuthStateChange,
  cmSyncProfile, cmGetProfile, cmUpdateProfile, cmGetDiscoverPlayers,
  cmBlockUser, cmReportUser, cmGetBlockedIds,
  cmSaveLocation, cmUploadAvatar, cmDeleteAccount,
  cmSendMatchRequest, cmGetMatches, cmAcceptMatch,
  cmGetMessages, cmSendMsg, cmMarkRead, cmSubscribeMessages, cmSubscribeMatches,
  cmSubscribeAllMessages, cmSubscribeAllMatches,
  cmSendSchedule, cmRespondSchedule, cmGetMySchedules,
});

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    bio: 'Tenise yeni başladım, çok hevesliyim. Birlikte öğreniriz!',
  },
];

const cx = (...a) => a.filter(Boolean).join(' ');

function _haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function Avatar({ p, size = 92 }) {

}

function SwipeDeck({ players, onResolve }) {
  const [idx, setIdx] = React.useState(0);
  const [drag, setDrag] = React.useState({ x: 0, y: 0, active: false });
  const [flying, setFlying] = React.useState(null); // {dir} animating card out
  const [expanded, setExpanded] = React.useState(false);
  const start = React.useRef(null);

  // reset when the filtered player set changes
  React.useEffect(() => { setIdx(0); setExpanded(false); }, [players]);

  const current = players[idx];
  const next = players[idx + 1];

  const finish = (dir) => {
    if (!current || flying) return;
    setFlying(dir);
    const liked = dir === 'right';
    setTimeout(() => {
      onResolve && onResolve(current, liked);
      setIdx((i) => i + 1);
      setDrag({ x: 0, y: 0, active: false });
      setExpanded(false);
      setFlying(null);
    }, 280);
  };

  const onDown = (e) => {
    if (flying || expanded) return;
    start.current = { x: e.clientX, y: e.clientY };
    setDrag({ x: 0, y: 0, active: true });
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };
  const onMove = (e) => {
    if (!start.current) return;
    setDrag({ x: e.clientX - start.current.x, y: e.clientY - start.current.y, active: true });
  };
  const onUp = () => {
    if (!start.current) return;
    start.current = null;
    if (drag.x > 105) finish('right');
    else if (drag.x < -105) finish('left');
    else setDrag({ x: 0, y: 0, active: false });
  };

  // transform for top card
  const rot = drag.x * 0.045;
  let tx = drag.x, ty = drag.y, tr = rot, transition = 'none';
  if (flying) {
    tx = flying === 'right' ? 700 : -700;
    ty = drag.y + 40;
    tr = flying === 'right' ? 22 : -22;
    transition = 'transform .28s cubic-bezier(.4,0,.2,1)';
  } else if (!drag.active) {
    transition = 'transform .35s cubic-bezier(.34,1.4,.5,1)';
  }

  const actions = (
    <div className="cm-actions">
      <button className="cm-act is-rewind" disabled={idx === 0 || !!flying}
        onClick={() => { setIdx((i) => Math.max(0, i - 1)); setExpanded(false); }} aria-label="Geri al">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M9 14L4 9l5-5M4 9h9a7 7 0 010 14h-3" stroke="currentColor" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <button className="cm-act is-nope" disabled={!current || !!flying} onClick={() => finish('left')} aria-label="Geç">
        <svg viewBox="0 0 24 24" width="30" height="30"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>
      </button>
      <button className="cm-act is-like" disabled={!current || !!flying} onClick={() => finish('right')} aria-label="Eşleş">
        <svg viewBox="0 0 24 24" width="30" height="30"><path d="M5 13l4 4L19 7" stroke="currentColor" strokeWidth="3.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
    </div>
  );

  if (!current) {
    return (
      <div className="cm-deck-wrap">
        <div className="cm-deck">
          <div className="cm-empty">
            <div className="cm-empty-mark">GAME · SET</div>
            <h3>Bugünlük bu kadar</h3>
            <p>Bu filtrede yeni oyuncu kalmadı. Yarıçapı genişlet ya da seviyeyi değiştir.</p>
            <button className="cm-reset" onClick={() => { setIdx(0); }}>Yeniden bak</button>
          </div>
        </div>
        {actions}
      </div>
    );
  }

  return (
    <div className="cm-deck-wrap">
      <div className="cm-deck">
        {next && !expanded && (
          <div className="cm-card-slot is-behind">
            <PlayerCard p={next} />
          </div>
        )}
        <div
          className="cm-card-slot is-front"
          style={{ transform: `translate(${tx}px, ${ty}px) rotate(${tr}deg)`, transition, cursor: expanded ? 'default' : 'grab' }}
          onPointerDown={onDown}
          onPointerMove={onMove}
          onPointerUp={onUp}
          onPointerCancel={onUp}
        >
          <PlayerCard p={current} dragX={flying === 'right' ? 120 : flying === 'left' ? -120 : drag.x}
            expanded={expanded} onToggle={() => setExpanded((v) => !v)} />
        </div>
      </div>
      {actions}
    </div>
  );
}

Object.assign(window, { PlayerCard, SwipeDeck });

const STYLE_OPTS = ['Agresif baseline', 'Baseline grinder', 'All-court', 'Serve & volley', 'Defansif', 'Yeni başlıyor'];
const HAND_OPTS = ['Sağ el', 'Sol el'];

function initialsOf(name) {
  const parts = String(name).trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  const a = parts[0][0] || '';
  const b = parts.length > 1 ? parts[parts.length - 1][0] : '';
  return (a + b).toLocaleUpperCase('tr');
}
function hueFromName(s) {
  let h = 7;
  for (const c of String(s)) h = (h * 31 + c.charCodeAt(0)) % 360;
  return h;
}
function buildMe(d) {
  const lvl = CM_LEVELS.find((l) => l.id === d.level) || CM_LEVELS[0];
  return {
    id: 'me', isMe: true, verified: false,
    name: d.name.trim(), initials: initialsOf(d.name), age: +d.age,
    email: (d.email || '').trim(), password: d.password || '',
    level: d.level, levelLabel: lvl.label, utrRange: lvl.utr,
    style: d.style, hand: d.hand, court: (d.court || '').trim() || '—',
    avail: d.avail, bio: (d.bio || '').trim(),
    hue: hueFromName(d.name + d.style),
  };
}

function SignupFlow({ initial, editing, onComplete, onCancel, onSwitchToLogin, loading = false, error = null }) {
  const { useState } = React;
  const [step, setStep] = useState(0);
  const [name, setName] = useState(initial?.name || '');
  const [age, setAge] = useState(initial?.age ? String(initial.age) : '');
  const [email, setEmail] = useState(initial?.email || '');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [level, setLevel] = useState(initial?.level || '');
  const [style, setStyle] = useState(initial?.style || '');
  const [hand, setHand] = useState(initial?.hand || 'Sağ el');
  const [court, setCourt] = useState(initial?.court && initial.court !== '—' ? initial.court : '');
  const [avail, setAvail] = useState(initial?.avail || '');
  const [bio, setBio] = useState(initial?.bio || '');

  const STEPS = [
    { k: 'KİMLİK', t: 'Kendini\ntanıt' },
    { k: 'SEVİYE', t: 'Senin\nseviyen ne?' },
    { k: 'OYUN PROFİLİ', t: 'Nasıl\noynuyorsun?' },
    { k: 'HAKKINDA', t: 'Birkaç\nsöz et' },
  ];
  const valid = [
    editing ? (name.trim().length >= 2 && +age >= 10 && +age <= 99) : (name.trim().length >= 2 && +age >= 10 && +age <= 99 && email.trim().includes('@') && password.length >= 6),
    !!level,
    !!style && !!hand,
    !!avail,
  ];
  const last = step === STEPS.length - 1;
  const go = () => {
    if (!valid[step]) return;
    if (last) onComplete(buildMe({ name, age, email, password, level, style, hand, court, avail, bio }));
    else setStep((s) => s + 1);
  };
  const back = () => { if (step === 0) onCancel && onCancel(); else setStep((s) => s - 1); };

  return (
    <div className="cm-signup">
      <div className="cm-su-top">
        <button className="cm-su-back" onClick={back} aria-label="Geri">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 6l-6 6 6 6" stroke="currentColor" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div className="cm-su-prog">
          {STEPS.map((s, i) => (
            <span key={i} className={cx('cm-su-seg', i <= step && 'is-on')} />

        <span className="cm-su-count">{step + 1}/{STEPS.length}</span>
      </div>

      <div className="cm-su-body">
        <span className="cm-su-kicker">▶ {editing ? 'PROFİLİ DÜZENLE' : `ADIM ${step + 1}`} · {STEPS[step].k}</span>
        <h1 className="cm-su-title">{STEPS[step].t}</h1>

        {step === 0 && (
          <div className="cm-su-fields">
            <label className="cm-field">
              <span className="cm-field-label">AD SOYAD</span>
              <input className="cm-input" value={name} onChange={(e) => setName(e.target.value)}
                placeholder="Örn. Arda Yılmaz" autoComplete="off" />
            </label>
            <label className="cm-field">
              <span className="cm-field-label">YAŞ</span>
              <input className="cm-input" value={age} onChange={(e) => setAge(e.target.value.replace(/\D/g, '').slice(0, 2))}
                placeholder="Örn. 27" inputMode="numeric" />
            </label>
            {!editing && (<>
              <label className="cm-field">
                <span className="cm-field-label">E-POSTA</span>
                <input className="cm-input" value={email} onChange={(e) => setEmail(e.target.value)}
                  placeholder="ornek@email.com" type="email" autoComplete="email" />
              </label>
              <label className="cm-field">
                <span className="cm-field-label">ŞİFRE <i>(en az 6 karakter)</i></span>
                <div className="cm-input-wrap">
                  <input className="cm-input" value={password} onChange={(e) => setPassword(e.target.value)}
                    placeholder="••••••••" type={showPass ? 'text' : 'password'} autoComplete="new-password" />
                  <button className="cm-input-eye" type="button" onClick={() => setShowPass(v => !v)}>
                    {showPass ? '◎' : '●'}
                  </button>
                </div>
              </label>
            </>)}
            <p className="cm-su-hint">Adın ve yaşın profilinde rakiplere görünür.</p>
            {!editing && onSwitchToLogin && (
              <button className="cm-su-login-link" type="button" onClick={onSwitchToLogin}>
                Zaten hesabım var → Giriş yap
              </button>
            )}
          </div>
        )}

        {step === 1 && (
          <div className="cm-gate-list cm-su-levels">
            {CM_LEVELS.map((l) => (
              <button key={l.id} className={cx('cm-gate-opt', level === l.id && 'is-sel')} onClick={() => setLevel(l.id)}>

                </span>
              </button>
            ))}
          </div>
        )}

        {step === 2 && (
          <div className="cm-su-fields">
            <div className="cm-field">
              <span className="cm-field-label">OYUN STİLİN</span>
              <div className="cm-chip-row">
                {STYLE_OPTS.map((o) => (
                  <button key={o} className={cx('cm-chip', style === o && 'is-sel')} onClick={() => setStyle(o)}>{o}</button>
                ))}

              <input className="cm-input" value={court} onChange={(e) => setCourt(e.target.value)}
                placeholder="Örn. Caddebostan Tenis" autoComplete="off" />
            </label>
          </div>

        {step === 3 && (
          <div className="cm-su-fields">
            <div className="cm-field">
              <span className="cm-field-label">NE ZAMAN MÜSAİTSİN</span>
              <div className="cm-chip-row">

                  <button key={o} className={cx('cm-chip', avail === o && 'is-sel')} onClick={() => setAvail(o)}>{o}</button>

            </div>
            <label className="cm-field">

            </label>

        )}
      </div>

      <div className="cm-su-foot">
        {error && <div className="cm-su-error">{error}</div>}
        <button className="cm-cta" disabled={!valid[step] || loading} onClick={go}>
          {loading ? 'Lütfen bekle…' : (last ? (editing ? 'DEĞİŞİKLİKLERİ KAYDET' : 'HESABI OLUŞTUR') : 'DEVAM')}
          {!loading && <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 12h14M13 6l6 6-6 6" stroke="var(--accent-ink)" strokeWidth="2.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
      </div>
    </div>
  );
}

function ProfileScreen({ me, onEdit, onAvatarChange, onDeleteAccount }) {

  const lvlColor = { baslangic: '#34d399', orta: '#f5c044', ileri: '#ff7058' }[me.level] || 'var(--accent)';

  useEffect(() => {
    if (me.id && me.id !== 'me') {
      cmGetMySchedules(me.id).then(setSchedules).catch(() => {});
    }
  }, [me.id]);

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploadErr(null);

          <Avatar p={me} size={88} />

              : <svg viewBox="0 0 24 24" width="13" height="13"><path d="M12 16V8M8 12l4-4 4 4" stroke="var(--accent-ink)" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/><rect x="3" y="17" width="18" height="2" rx="1" fill="var(--accent-ink)"/></svg>
            }
          </label>
        </div>
        <div className="cm-prof-id">
          <div className="cm-prof-name-row">
            <h2 className="cm-prof-name">{me.name}</h2>
            <span className="cm-prof-badge">YENİ</span>
          </div>

function BlockReportMenu({ onBlock, onReport }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    document.addEventListener('click', close, { once: true });
    return () => document.removeEventListener('click', close);
  }, [open]);
  return (
    <div className="cm-action-wrap">
      <button className="cm-mrow-icon" onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }} aria-label="Seçenekler">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
      </button>
      {open && (
        <div className="cm-action-menu" onClick={e => e.stopPropagation()}>
          <button onClick={() => { setOpen(false); onReport(); }}>Şikayet et</button>
          <button className="is-danger" onClick={() => { setOpen(false); onBlock(); }}>Engelle</button>
        </div>
      )}
    </div>
  );
}

function MatchesScreen({ incoming, pending, matches, onSchedule, onChat, onAccept, onBlock, onReport }) {

              <div className="cm-mrow-main">
                <div className="cm-mrow-name">{p.name}</div>
                <div className="cm-mrow-sub cm-mrow-wait"><i className="cm-wait-dot" />İstek gönderildi · yanıt bekleniyor</div>
              </div>

        </>

      {!!matches.length && (
        <>

                <button className="cm-mrow-icon" onClick={() => onSchedule(p)} title="Maç ayarla" aria-label="Maç ayarla">{CalIcon}</button>

// ── Sohbet: thread list ──────────────────────────────────
function ChatList({ order, threads, players, onOpen }) {
  if (!order.length) {
    return (
      <div className="cm-stub">
        <div className="cm-stub-mark">◌</div>
        <h3>Sohbet yok</h3>
        <p>Bir eşleşmen olduğunda sohbet burada açılır. Eşleştiğin oyuncuyla maçı buradan konuşursun.</p>
      </div>
    );
  }
  return (
    <div className="cm-mlist">
      <div className="cm-mlist-head">SOHBETLER</div>
      {order.map((id) => {
        const p = players.find((x) => x.id === id);
        const th = threads[id];
        if (!p || !th) return null;
        const last = th.messages[th.messages.length - 1];
        return (
          <button key={id} className="cm-mrow" onClick={() => onOpen(id)}>
            <Avatar p={p} size={48} />
            <div className="cm-mrow-main">
              <div className="cm-mrow-name">{p.name}</div>
              <div className="cm-chat-prev">{last ? (last.from === 'me' ? 'Sen: ' : '') + (last.text.startsWith('__SCHEDULE__:') ? '🎾 Maç teklifi' : last.text) : 'Mesaj yok…'}</div>
            </div>
            {th.unread > 0 && <span className="cm-unread">{th.unread}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ── Maç teklifi kartı (chat içinde) ─────────────────────
function ScheduleCard({ data, isMe, onRespond }) {
  const [done, setDone] = React.useState(false);
  const respond = (status) => { setDone(true); onRespond(data.id, status); };
  const statusText = { accepted: '✓ Kabul edildi', rejected: '✗ Reddedildi' }[data.status] || null;
  return (
    <div className="cm-sched-card">
      <div className="cm-sched-label">MAÇ TEKLİFİ</div>
      <div className="cm-sched-row"><b>{data.court}</b></div>
      <div className="cm-sched-row">{data.surf} · {data.day} · {data.time}</div>
      {!isMe && !done && !statusText && (
        <div className="cm-sched-btns">
          <button className="cm-sched-accept" onClick={() => respond('accepted')}>Kabul Et</button>
          <button className="cm-sched-reject" onClick={() => respond('rejected')}>Reddet</button>
        </div>
      )}
      {(isMe || done || statusText) && (
        <div className="cm-sched-done">{statusText || (done ? '✓ Yanıtlandı' : 'Gönderildi')}</div>
      )}
    </div>
  );
}

// ── Sohbet: single thread ────────────────────────────────
function ChatThread({ player, thread, onBack, onSend, onSchedule, onRespond, onBlock, onReport }) {
  const { useState, useRef, useEffect } = React;
  const [text, setText] = useState('');
  const bodyRef = useRef(null);
  const messages = thread?.messages || [];
  useEffect(() => {
    const el = bodyRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [messages.length]);
  const submit = () => {
    const v = text.trim();
    if (!v) return;
    onSend(player.id, v);
    setText('');
  };
  return (
    <div className="cm-chat">
      <div className="cm-chat-head">
        <button className="cm-chat-back" onClick={onBack} aria-label="Geri">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 6l-6 6 6 6" stroke="currentColor" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <Avatar p={player} size={40} />
        <div className="cm-chat-id">
          <div className="cm-chat-name">{player.name}</div>
          <div className="cm-chat-status"><i className="cm-on-dot" />Çevrimiçi</div>
        </div>
        <button className="cm-chat-sched" onClick={() => onSchedule(player)}>{CalIcon}Maç</button>
        <BlockReportMenu onBlock={() => onBlock(player)} onReport={() => onReport(player)} />
      </div>
      <div className="cm-chat-body" ref={bodyRef}>
        <div className="cm-chat-day">EŞLEŞTİNİZ · {player.court}</div>
        {messages.map((m, i) => {
          if (m.text.startsWith('__SCHEDULE__:')) {
            let d; try { d = JSON.parse(m.text.slice(13)); } catch(e) { d = null; }
            if (d) return (
              <div key={i} className={cx('cm-bubble', m.from === 'me' ? 'is-me' : 'is-them')} style={{ padding: 0, background: 'none', border: 'none' }}>
                <div style={{ background: m.from === 'me' ? 'var(--accent)' : 'var(--card2)', border: m.from !== 'me' ? '1px solid var(--line)' : 'none', borderRadius: 16, overflow: 'hidden' }}>
                  <ScheduleCard data={d} isMe={m.from === 'me'} onRespond={onRespond} />
                </div>
              </div>
            );
          }
          return <div key={i} className={cx('cm-bubble', m.from === 'me' ? 'is-me' : 'is-them')}>{m.text}</div>;
        })}
      </div>
      <div className="cm-chat-input">
        <input value={text} onChange={(e) => setText(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
          placeholder="Mesaj yaz…" />
        <button className="cm-chat-send" onClick={submit} disabled={!text.trim()} aria-label="Gönder">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 12l16-8-6 16-3-6-7-2z" stroke="var(--accent-ink)" strokeWidth="2" fill="none" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}

// ── Accept toast (delayed acceptance) ────────────────────
function MatchToast({ player, onOpen, onClose }) {
  return (
    <button className="cm-toast" onClick={onOpen}>
      <Avatar p={player} size={40} />
      <div className="cm-toast-main">
        <div className="cm-toast-title">{player.name} eşleşmeyi kabul etti</div>
        <div className="cm-toast-sub">Sohbeti açmak için dokun</div>
      </div>
      <span className="cm-toast-x" onClick={(e) => { e.stopPropagation(); onClose(); }} aria-label="Kapat">×</span>
    </button>
  );
}

Object.assign(window, { MatchesScreen, ChatList, ChatThread, MatchToast, openerFor, replyFor });

const { useState, useRef, useEffect } = React;

// ── Global hata yakalayıcı ────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) return (
      <div style={{ position:'fixed', inset:0, background:'#0d0d0d', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, padding:24, color:'#fff', fontFamily:'monospace', fontSize:13 }}>
        <div style={{ fontSize:36 }}>⚠️</div>
        <b style={{ color:'#dcfc32' }}>Bir hata oluştu</b>
        <p style={{ color:'#888', textAlign:'center', maxWidth:280, lineHeight:1.5 }}>{this.state.err.message}</p>
        <button onClick={() => { this.setState({ err: null }); window.location.reload(); }}
          style={{ marginTop:8, background:'#dcfc32', color:'#000', border:'none', borderRadius:12, padding:'12px 24px', fontFamily:'monospace', fontWeight:700, cursor:'pointer' }}>
          YENİDEN BAŞLAT
        </button>
      </div>
    );
    return this.props.children;
  }
}
