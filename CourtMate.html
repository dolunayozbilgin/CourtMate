// ── Root app ─────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "charged",
  "accent": "#dcfc32",
  "startLevel": "ileri",
  "showMateScore": true
}/*EDITMODE-END*/;

const ME_KEY = 'cm_me_v1';
const loadMe = () => { try { return JSON.parse(localStorage.getItem(ME_KEY)) || null; } catch (e) { return null; } };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [me, setMe] = useState(loadMe);
  const [editing, setEditing] = useState(false);
  const [stage, setStage] = useState(() => loadMe() ? 'app' : 'signup');
  const [tab, setTab] = useState('discover');
  const [filter, setFilter] = useState(() => { const m = loadMe(); return m ? m.level : 'hepsi'; });
  const [distFilter, setDistFilter] = useState('hepsi');
  const [myCoords, setMyCoords] = useState(null);
  const [blockedIds, setBlockedIds] = useState(new Set());
  const [reportTarget, setReportTarget] = useState(null);
  const [match, setMatch] = useState(null);     // matched player (full overlay)
  const [schedule, setSchedule] = useState(null); // player being scheduled
  const [sent, setSent] = useState(null);        // {data, player}
  const [matches, setMatches] = useState([]);    // accepted match ids
  const [pending, setPending] = useState([]);    // sent request ids awaiting accept
  const [threads, setThreads] = useState({});    // id -> { messages:[{from,text}], unread }
  const [chatOrder, setChatOrder] = useState([]);// most-recent-first thread ids
  const [activeChat, setActiveChat] = useState(null); // open thread id
  const [toast, setToast] = useState(null);
  const [supaLoading, setSupaLoading] = useState(false);
  const [supaError, setSupaError]     = useState(null);
  const [pendingEmail, setPendingEmail] = useState('');
  const [realPlayers, setRealPlayers] = useState(null);
  const [incoming, setIncoming] = useState([]); // bana gelen istekler [{partnerId, matchId}]
  const matchIdsRef = React.useRef({});         // partnerId -> matchId
  const timersRef = React.useRef([]);

  // clear all pending timers on unmount
  useEffect(() => () => { timersRef.current.forEach(clearTimeout); }, []);

  // Supabase oturumu kontrol et
  useEffect(() => {
    const PENDING_KEY = 'cm_pending_v1';
    const getPending = () => { try { return JSON.parse(localStorage.getItem(PENDING_KEY)); } catch(e) { return null; } };
    (async () => {
      try {
        const { session } = await cmGetSession();
        if (!session) return;
        const pending = getPending();
        if (pending) { try { await cmSyncProfile(session.user.id, pending); localStorage.removeItem(PENDING_KEY); } catch(e) {} }
        const profile = await cmGetProfile(session.user.id);
        if (profile) {
          const meData = profileToMe(profile, session.user.email);
          setMe(meData); setFilter(meData.level);
          try { localStorage.setItem(ME_KEY, JSON.stringify(meData)); } catch(e) {}
          setStage('app');
        }
      } catch(err) { console.warn('Supabase oturum kontrolü:', err.message); }
    })();
  }, []);

  // Keşfet: gerçek oyuncuları Supabase'den çek
  useEffect(() => {
    if (stage !== 'app') return;
    (async () => {
      try {
        let uid = me && me.id && me.id !== 'me' ? me.id : null;
        if (!uid) {
          const { session } = await cmGetSession();
          uid = session ? session.user.id : '00000000-0000-0000-0000-000000000000';
        }
        const players = await cmGetDiscoverPlayers(uid);
        setRealPlayers(players.length > 0 ? players : null);
      } catch(err) { console.warn('Oyuncular alınamadı:', err.message); }
    })();
  }, [stage, me && me.id]);

  // Eşleşmeleri + mesajları yükle (ve realtime ile canlı tut)
  const myId = me && me.id && me.id !== 'me' ? me.id : null;

  // Push bildirimi kaydı
  useEffect(() => {
    if (!myId) return;
    cmRegisterPush(myId);
  }, [myId]);

  // Engellenmiş kullanıcıları yükle
  useEffect(() => {
    if (!myId) return;
    cmGetBlockedIds(myId).then(ids => setBlockedIds(new Set(ids))).catch(() => {});
  }, [myId]);

  const blockPlayer = async (player) => {
    if (!myId) return;
    try {
      await cmBlockUser(myId, player.id);
      setBlockedIds(prev => new Set([...prev, player.id]));
      setMatches(m => m.filter(id => id !== player.id));
      setIncoming(inc => inc.filter(i => i.partnerId !== player.id));
      setPending(p => p.filter(id => id !== player.id));
      setThreads(th => { const n = { ...th }; delete n[player.id]; return n; });
      setChatOrder(o => o.filter(id => id !== player.id));
      if (activeChat === player.id) setActiveChat(null);
    } catch(e) { console.warn('Engelleme başarısız:', e.message); }
  };

  const reportPlayer = async (player, reason) => {
    if (!myId) return;
    try { await cmReportUser(myId, player.id, reason); } catch(e) { console.warn('Şikayet başarısız:', e.message); }
  };

  // GPS konum al — izin verilirse profile kaydet
  useEffect(() => {
    if (!myId || !navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      async ({ coords }) => {
        const { latitude: lat, longitude: lng } = coords;
        setMyCoords({ lat, lng });
        try { await cmSaveLocation(myId, lat, lng); } catch(e) {}
      },
      () => {}  // izin verilmezse sessizce geç
    );
  }, [myId]);
  const myIdRef = React.useRef(myId);
  React.useEffect(() => { myIdRef.current = myId; }, [myId]);
  const reloadMatches = React.useCallback(async () => {
    if (!myId) return;
    try {
      const rows = await cmGetMatches(myId);
      const acc = [], pend = [], inc = [];
      const idMap = {};
      for (const r of rows) {
        const partnerId = r.sender_id === myId ? r.receiver_id : r.sender_id;
        if (r.status === 'accepted') { acc.push(partnerId); idMap[partnerId] = r.id; }
        else if (r.status === 'pending') {
          if (r.sender_id === myId) pend.push(partnerId);
          else inc.push({ partnerId, matchId: r.id });
        }
      }
      matchIdsRef.current = idMap;
      setMatches(acc); setPending(pend); setIncoming(inc);
      // accepted eşleşmelerin mesajlarını yükle
      const threadsObj = {};
      for (const pid of acc) {
        try {
          const msgs = await cmGetMessages(idMap[pid]);
          threadsObj[pid] = {
            matchId: idMap[pid],
            messages: msgs.map(m => ({ from: m.sender_id === myId ? 'me' : 'them', text: m.text, id: m.id })),
            unread: msgs.filter(m => m.sender_id !== myId && !m.read_at).length,
          };
        } catch(e) {}
      }
      setThreads(prev => {
        const merged = { ...prev };
        for (const [pid, serverTh] of Object.entries(threadsObj)) {
          const existing = prev[pid];
          if (!existing) { merged[pid] = serverTh; continue; }
          const serverIds = new Set(serverTh.messages.map(m => m.id));
          const optimistic = existing.messages.filter(m => String(m.id || '').startsWith('tmp-') && !serverIds.has(m.id));
          merged[pid] = { ...serverTh, messages: [...serverTh.messages, ...optimistic] };
        }
        return merged;
      });
      setChatOrder(prev => {
        const keep = prev.filter(id => acc.includes(id));
        const add  = acc.filter(id => !prev.includes(id));
        return [...keep, ...add];
      });
    } catch(e) { console.warn('Eşleşmeler yüklenemedi:', e.message); }
  }, [myId]);

  useEffect(() => {
    if (stage !== 'app' || !myId) return;
    reloadMatches();
    const chMatches = cmSubscribeAllMatches(() => { reloadMatches(); });
    const chMsgs = cmSubscribeAllMessages((payload) => {
      const m = payload.new;
      if (!m) return;
      // hangi partner'a ait?
      const idMap = matchIdsRef.current;
      const partnerId = Object.keys(idMap).find(pid => idMap[pid] === m.match_id);
      if (!partnerId) { reloadMatches(); return; } // yeni eşleşme olabilir
      if (m.sender_id === myIdRef.current) return; // kendi mesajım (zaten ekli)
      setThreads(th => {
        const t0 = th[partnerId] || { matchId: m.match_id, messages: [], unread: 0 };
        if (t0.messages.some(x => x.id === m.id)) return th; // duplicate
        const isActive = activeChatRef.current === partnerId;
        return { ...th, [partnerId]: {
          ...t0,
          messages: [...t0.messages, { from: 'them', text: m.text, id: m.id }],
          unread: isActive ? 0 : (t0.unread || 0) + 1,
        }};
      });
      setChatOrder(o => [partnerId, ...o.filter(x => x !== partnerId)]);
      if (activeChatRef.current === partnerId) { try { cmMarkRead(m.match_id, myId); } catch(e) {} }
    });
    return () => {
      try { cm_db.removeChannel(chMatches); } catch(e) {}
      try { cm_db.removeChannel(chMsgs); } catch(e) {}
    };
  }, [stage, myId, reloadMatches]);

  // aktif sohbeti ref'te tut (realtime callback için)
  const activeChatRef = React.useRef(null);
  useEffect(() => { activeChatRef.current = activeChat; }, [activeChat]);

  // apply theme + accent to root
  useEffect(() => {
    const root = document.getElementById('cm-root');
    if (!root) return;
    root.dataset.theme = t.theme;
    root.dataset.mate = t.showMateScore ? 'on' : 'off';
    root.style.setProperty('--accent', t.accent);
  }, [t.theme, t.accent, t.showMateScore]);

  const completeSignup = async (account) => {
    setSupaLoading(true); setSupaError(null);
    try {
      if (editing) {
        const { session } = await cmGetSession();
        if (session) {
          const updated = await cmUpdateProfile(session.user.id, {
            name: account.name, age: Number(account.age), level: account.level,
            style: account.style || null, hand: account.hand || 'Sağ el',
            court: account.court && account.court !== '—' ? account.court : null,
            avail: account.avail || null, bio: account.bio || null,
          });
          const meData = profileToMe(updated, session.user.email);
          setMe(meData); try { localStorage.setItem(ME_KEY, JSON.stringify(meData)); } catch(e) {}
        } else {
          setMe(account); try { localStorage.setItem(ME_KEY, JSON.stringify(account)); } catch(e) {}
        }
        setEditing(false); setStage('app'); setTab('profile'); return;
      }
      const result = await cmSignUp(account.email, account.password, account);
      if (result.needsConfirmation) {
        try { localStorage.setItem('cm_pending_v1', JSON.stringify(account)); } catch(e) {}
        setPendingEmail(account.email); setStage('confirm-email');
      } else {
        const profile = await cmGetProfile(result.user.id);
        const meData = profile ? profileToMe(profile, account.email) : { ...account, id: result.user.id };
        setMe(meData); try { localStorage.setItem(ME_KEY, JSON.stringify(meData)); } catch(e) {}
        setFilter(account.level); setEditing(false); setStage('app');
      }
    } catch(err) {
      const msg = err.message || 'Bir hata oluştu';
      setSupaError(msg.includes('already registered') ? 'Bu e-posta zaten kayıtlı — giriş yap.' : msg);
    } finally { setSupaLoading(false); }
  };

  const handleLogin = async (email, password) => {
    setSupaLoading(true); setSupaError(null);
    try {
      const { user } = await cmSignIn(email, password);
      const pending = (() => { try { return JSON.parse(localStorage.getItem('cm_pending_v1')); } catch(e) { return null; } })();
      if (pending) { try { await cmSyncProfile(user.id, pending); localStorage.removeItem('cm_pending_v1'); } catch(e) {} }
      const profile = await cmGetProfile(user.id);
      if (profile) {
        const meData = profileToMe(profile, user.email);
        setMe(meData); setFilter(meData.level);
        try { localStorage.setItem(ME_KEY, JSON.stringify(meData)); } catch(e) {}
        setStage('app');
      } else { setStage('signup'); }
    } catch(err) {
      const msg = err.message || 'Giriş başarısız';
      setSupaError(msg.includes('Invalid') ? 'E-posta veya şifre hatalı' : msg);
    } finally { setSupaLoading(false); }
  };

  const resetAll = async () => {
    try { await cmSignOut(); } catch(e) {}
    try { localStorage.removeItem(ME_KEY); localStorage.removeItem('cm_pending_v1'); } catch(e) {}
    timersRef.current.forEach(clearTimeout); timersRef.current = [];
    setMe(null); setEditing(false); setStage('signup'); setTab('discover');
    setMatch(null); setSchedule(null); setSent(null);
    setMatches([]); setPending([]); setThreads({}); setChatOrder([]); setActiveChat(null); setToast(null);
    setSupaLoading(false); setSupaError(null); setPendingEmail(''); setRealPlayers(null);
    setMyCoords(null); setDistFilter('hepsi');
    setBlockedIds(new Set()); setReportTarget(null);
  };

  const playerPool = (realPlayers || CM_PLAYERS).filter(p => !blockedIds.has(p.id));

  const playerPoolWithDist = React.useMemo(() => {
    if (!myCoords) return playerPool;
    return playerPool.map(p => {
      if (p.lat == null || p.lng == null) return p;
      return { ...p, dist: +_haversineKm(myCoords.lat, myCoords.lng, p.lat, p.lng).toFixed(1) };
    });
  }, [playerPool, myCoords]);

  const filtered = React.useMemo(() => {
    return playerPoolWithDist.filter(p => {
      if (filter !== 'hepsi' && p.level !== filter) return false;
      if (distFilter !== 'hepsi') {
        if (!myCoords || p.dist == null || p.dist > distFilter) return false;
      }
      return true;
    });
  }, [filter, distFilter, playerPoolWithDist, myCoords]);

  // create a chat thread seeded locally (gerçek mesajlar Supabase'den gelir)
  const addThread = (player) => {
    setThreads((th) => (th[player.id] ? th : { ...th, [player.id]: { matchId: matchIdsRef.current[player.id], messages: [], unread: 0 } }));
    setChatOrder((o) => [player.id, ...o.filter((x) => x !== player.id)]);
  };

  // bana gelen bir isteği kabul et → gerçek eşleşme
  const acceptIncoming = async (partnerId, matchId) => {
    try {
      await cmAcceptMatch(matchId);
      matchIdsRef.current[partnerId] = matchId;
      setIncoming(inc => inc.filter(i => i.partnerId !== partnerId));
      const player = playerPool.find(p => p.id === partnerId);
      setMatches(m => m.includes(partnerId) ? m : [...m, partnerId]);
      addThread({ id: partnerId });
      if (player) setMatch(player);
      reloadMatches();
    } catch(e) { console.warn('Kabul edilemedi:', e.message); }
  };

  // swipe right / tap ✓ on Keşfet → gerçek istek gönder
  const resolve = async (player, liked) => {
    if (!liked) return;
    if (!myId) { console.warn('Giriş gerekli'); return; }
    if (matches.includes(player.id) || pending.includes(player.id)) return;
    // bana zaten istek göndermişse → direkt kabul et (karşılıklı eşleşme)
    const inc = incoming.find(i => i.partnerId === player.id);
    if (inc) { acceptIncoming(player.id, inc.matchId); return; }
    // yeni istek gönder
    setPending((p) => [...p, player.id]);
    try {
      await cmSendMatchRequest(myId, player.id);
    } catch(e) {
      // zaten istek varsa veya hata → pending'den çıkar
      if (!String(e.message).includes('duplicate')) {
        setPending((p) => p.filter(id => id !== player.id));
        console.warn('İstek gönderilemedi:', e.message);
      }
    }
  };

  // open a chat thread + clear its unread (Supabase'de okundu işaretle)
  const openChat = (id) => {
    setActiveChat(id);
    setTab('chat');
    setThreads((th) => (th[id] ? { ...th, [id]: { ...th[id], unread: 0 } } : th));
    const mid = matchIdsRef.current[id];
    if (mid && myId) { try { cmMarkRead(mid, myId); } catch(e) {} }
  };

  // maç teklifine yanıt ver
  const respondSchedule = async (partnerId, scheduleId, status) => {
    const mid = matchIdsRef.current[partnerId];
    if (!mid || !myId) return;
    try {
      await cmRespondSchedule(scheduleId, status);
      const txt = status === 'accepted' ? '✓ Maç teklifini kabul ettim!' : '✗ Maç teklifini reddettim.';
      await cmSendMsg(mid, myId, txt);
    } catch(e) { console.warn('Yanıt gönderilemedi:', e.message); }
  };

  // gerçek mesaj gönder (otomatik cevap YOK)
  const sendMessage = async (id, text) => {
    const mid = matchIdsRef.current[id];
    if (!mid || !myId) { console.warn('Eşleşme bulunamadı'); return; }
    // optimistic: hemen ekrana koy
    const tempId = 'tmp-' + Date.now();
    setThreads((th) => ({ ...th, [id]: { ...(th[id] || { matchId: mid, unread: 0, messages: [] }), messages: [...((th[id] && th[id].messages) || []), { from: 'me', text, id: tempId }] } }));
    setChatOrder((o) => [id, ...o.filter((x) => x !== id)]);
    try {
      const saved = await cmSendMsg(mid, myId, text);
      // tempId'yi gerçek id ile değiştir
      setThreads((th) => {
        const t0 = th[id]; if (!t0) return th;
        return { ...th, [id]: { ...t0, messages: t0.messages.map(m => m.id === tempId ? { ...m, id: saved.id } : m) } };
      });
    } catch(e) { console.warn('Mesaj gönderilemedi:', e.message); }
  };

  const pendingPlayers  = pending.map((id) => playerPool.find((p) => p.id === id)).filter(Boolean);
  const matchPlayers    = matches.map((id) => playerPool.find((p) => p.id === id)).filter(Boolean);
  const incomingItems   = incoming.map(i => ({ player: playerPool.find(p => p.id === i.partnerId), matchId: i.matchId })).filter(i => i.player);
  const chatUnread = Object.values(threads).reduce((n, th) => n + (th.unread || 0), 0);
  const activePlayer = activeChat ? playerPool.find((p) => p.id === activeChat) : null;

  return (
    <div id="cm-root" className="cm-root" data-theme={t.theme}>
      {stage === 'signup' && (
        <SignupFlow initial={editing ? me : null} editing={editing}
          loading={supaLoading} error={supaError}
          onComplete={completeSignup}
          onSwitchToLogin={() => { setSupaError(null); setStage('login'); }}
          onCancel={editing ? () => { setEditing(false); setStage('app'); setTab('profile'); } : null} />
      )}
      {stage === 'login' && (
        <LoginForm onLogin={handleLogin} loading={supaLoading} error={supaError}
          onBack={() => { setSupaError(null); setStage('signup'); }}
          onSwitchToSignup={() => { setSupaError(null); setStage('signup'); }} />
      )}
      {stage === 'confirm-email' && (
        <EmailConfirmation email={pendingEmail}
          onGoToLogin={() => { setSupaError(null); setStage('login'); }} />
      )}

      {stage === 'app' && (
        <div className="cm-app">
          <TopBar live={filtered.length} distFilter={distFilter} />
          {tab === 'discover' && (
            <div className="cm-discover">
              <LevelFilter value={filter} onChange={setFilter} />
              <DistFilter value={distFilter} hasCoords={!!myCoords} onChange={(v) => {
                if (v !== 'hepsi' && !myCoords && navigator.geolocation) {
                  navigator.geolocation.getCurrentPosition(
                    async ({ coords }) => {
                      const { latitude: lat, longitude: lng } = coords;
                      setMyCoords({ lat, lng });
                      try { await cmSaveLocation(myId, lat, lng); } catch(e) {}
                    },
                    () => {}
                  );
                }
                setDistFilter(v);
              }} />
              <SwipeDeck players={filtered} onResolve={resolve} />
            </div>
          )}
          {tab === 'matches' && (
            <MatchesScreen incoming={incomingItems} pending={pendingPlayers} matches={matchPlayers}
              onSchedule={(p) => setSchedule(p)} onChat={openChat} onAccept={acceptIncoming}
              onBlock={blockPlayer} onReport={(p) => setReportTarget(p)} />
          )}
          {tab === 'chat' && (
            activeChat && activePlayer && threads[activeChat]
              ? <ChatThread player={activePlayer} thread={threads[activeChat]}
                  onBack={() => setActiveChat(null)} onSend={sendMessage}
                  onSchedule={(p) => setSchedule(p)}
                  onRespond={(schedId, status) => respondSchedule(activeChat, schedId, status)}
                  onBlock={blockPlayer} onReport={(p) => setReportTarget(p)} />
              : <ChatList order={chatOrder} threads={threads} players={playerPool} onOpen={openChat} />
          )}
          {tab === 'profile' && me && (
            <ProfileScreen me={me} onEdit={() => { setEditing(true); setStage('signup'); }}
              onAvatarChange={(url) => {
                const updated = { ...me, avatar_url: url };
                setMe(updated);
                try { localStorage.setItem(ME_KEY, JSON.stringify(updated)); } catch(e) {}
              }}
              onDeleteAccount={async () => {
                if (me.id && me.id !== 'me') {
                  try { await cmDeleteAccount(me.id); } catch(e) { console.warn('Hesap silme:', e.message); }
                }
                resetAll();
              }}
            />
          )}
          <TabBar active={tab} onTab={(x) => { if (x !== 'chat') setActiveChat(null); setTab(x); }}
            badges={{ matches: pending.length, chat: chatUnread }} />
        </div>
      )}

      {toast && <MatchToast player={toast} onOpen={() => { const id = toast.id; setToast(null); openChat(id); }} onClose={() => setToast(null)} />}
      {reportTarget && <ReportSheet player={reportTarget} onClose={() => setReportTarget(null)}
        onSubmit={(reason) => reportPlayer(reportTarget, reason)} />}

      {match && <MatchOverlay player={match} onSchedule={(p) => { setMatch(null); setSchedule(p); }} onKeep={() => setMatch(null)} />}
      {schedule && <ScheduleSheet player={schedule} onClose={() => setSchedule(null)} onSend={async (data) => {
        const p = schedule;
        setSchedule(null);
        const mid = matchIdsRef.current[p.id];
        if (mid && myId) {
          try {
            const sched = await cmSendSchedule(mid, myId, p.id, { courtName: data.court.name, courtSurf: data.court.surf, day: data.day, time: data.time });
            const schedText = '__SCHEDULE__:' + JSON.stringify({ id: sched.id, court: data.court.name, surf: data.court.surf, day: data.day, time: data.time });
            await cmSendMsg(mid, myId, schedText);
          } catch(e) { console.warn('Teklif kaydedilemedi:', e.message); }
        }
        setSent({ data, player: p });
      }} />}
      {sent && <SentToast data={sent.data} player={sent.player} onDone={() => { setSent(null); setTab('discover'); }} />}

      <TweaksPanel>
        <TweakSection label="Tema" />
        <TweakRadio label="Görsel yön" value={t.theme} options={[{ value: 'charged', label: 'Charged' }, { value: 'premium', label: 'Premium' }]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="Accent" value={t.accent}
          options={['#dcfc32', '#c9b26b', '#5ad6a0', '#ff8a3d', '#7aa2ff']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Akış" />
        <TweakToggle label="Mate Score göster" value={t.showMateScore} onChange={(v) => setTweak('showMateScore', v)} />
        <TweakButton label="Akışı sıfırla" onClick={resetAll}>
          Hesabı sil, baştan başla
        </TweakButton>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);


  </script>

  <script>
    // scale device to fit viewport
    function fit() {
      const stage = document.getElementById('stage');
      const s = Math.min(1, (window.innerHeight - 32) / 874, (window.innerWidth - 24) / 402);
      stage.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit); fit();
  </script>
</body>
</html>
